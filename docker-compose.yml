services:
  app:
    build:
      context: .
    image: flash-sale-platform:local
    container_name: flash-sale-platform-app
    restart: unless-stopped
    environment:
      MYSQL_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-flash_sale_platform}?useSSL=false&useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&allowPublicKeyRetrieval=true
      MYSQL_USERNAME: ${MYSQL_USERNAME:-flash_sale_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-flash_sale_app}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-flash_sale}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-flash_sale}
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me-dev-only-change-me-32bytes}
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-MOCK}
      MOCK_WEBHOOK_SECRET: ${MOCK_WEBHOOK_SECRET:-}
      GMAIL_FROM: ${GMAIL_FROM:-}
      GMAIL_APP_PASS: ${GMAIL_APP_PASS:-}
      JAVA_OPTS: ${JAVA_OPTS:-}
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    container_name: flash-sale-platform-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-flash_sale_platform}
      MYSQL_USER: ${MYSQL_USERNAME:-flash_sale_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-flash_sale_app}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./src/main/resources/db/flash_sale_platform.sql:/docker-entrypoint-initdb.d/01-flash-sale-platform.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7.4-alpine
    container_name: flash-sale-platform-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: flash-sale-platform-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-flash_sale}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-flash_sale}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: flash-sale-platform-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - app

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
  prometheus-data:
